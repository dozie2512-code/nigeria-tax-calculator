<script>
    // Function to build the TaxProMax CIT payload
    function buildTaxProMaxCITPayload() {
        const payload = {
            metadata: {
                generatedAt: new Date().toISOString(),
                taxYear: '2026', // or periodStart/periodEnd if present
                activeUserId: localStorage.getItem('activeUserId'),
                activeBusinessId: localStorage.getItem('activeBusinessId'),
                businessName: localStorage.getItem('businessName'),
            },
            currency: 'NGN',
            scheduleSections: {
                Revenue: null,  // To be filled from reports if available
                NonCurrentAssets: null,
                CurrentAssets: null,
                CostOfSales: null,
                DirectExpenses: null,
                IndirectExpenses: null,
                InvestmentIncome: null,
                NonTaxableIncome: null,
                DisallowableExpenses: null,
                RelatedParty: null,
                Disclosures: null,
                VAT: null,
                PAYE: null,
                WHT: null,
                PIT: null,
                CapitalAllowance: null,
            },
            robotHints: {
                revenueFieldLabel: 'Revenue',
                currencySelection: 'uses radio buttons',
            }
        };

        // Here you would fetch or derive the revenue from existing reports
        // If reports exist, populate accordingly, else leave as null with notes explaining required mapping

        return payload;
    }

    // Helper function to download JSON
    function downloadJSON(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Export function
    function exportTaxProMaxCIT() {
        try {
            const payload = buildTaxProMaxCITPayload();
            downloadJSON('TaxProMax_CIT.json', payload);
        } catch (error) {
            console.error('Error exporting TaxProMax CIT:', error);
        }
    }
</script>

<button onclick="exportTaxProMaxCIT()">Export TaxProMax (CIT) JSON</button>
