<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>New Page — Taxmax Ng</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --muted: #6b7280;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --bg: #f3f4f6;
      --panel: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-secondary: #4b5563;
      --radius: 8px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      margin: 0; color: var(--text); background: var(--bg);
      font-size: 14px; line-height: 1.5;
    }
    header {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 20px; box-shadow: var(--shadow-sm);
      position: sticky; top: 0; z-index: 40;
    }
    h1 { margin: 0; font-size: 1rem; font-weight: 700; }
    main { padding: 20px; max-width: 960px; margin: 0 auto; }
    .panel {
      border: 1px solid var(--border); padding: 24px; background: var(--panel);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
    }
    .panel h2 { margin-top: 0; font-size: 1.25rem; font-weight: 700; }
    .panel p { color: var(--text-secondary); }
    a.btn {
      display: inline-block; padding: 8px 16px; border-radius: 6px;
      background: var(--accent); color: #fff; text-decoration: none;
      font-weight: 500; font-size: 0.875rem;
      transition: background 0.15s;
    }
    a.btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <header>
    <h1>Taxmax Ng</h1>
  </header>
  <main>
    <div class="panel">
      <h2>New Page</h2>
      <p>This page is a starting point. Replace this content with your own.</p>
      <p><a class="btn" href="/">Back to home</a></p>
    </div>
  </main>
</body>
</html>
